<!DOCTYPE html>
<head>
    <title>calculator</title>
    <link rel="stylesheet" href="style1.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="header">
        <h1>Calculator</h1>
    </div>
    <br>

    
    <table class="calc_table">
        <tr>
            <td><input class="numbers_table" type="button" value="1" onclick="display('1')" ></td>
            <td><input class="numbers_table" type="button" value="2" onclick="display('2')"></td>
            <td><input class="numbers_table" type="button" value="3" onclick="display('3')"></td>
            <td><button class="numbers_table" onclick="display('+')">+</button></td>
        </tr>
        <tr>
            <td><button class="numbers_table" onclick="display('4')">4</button></td>
            <td><button class="numbers_table" onclick="display('5')">5</button></td>
            <td><button class="numbers_table" onclick="display('6')">6</button></td>
            <td><button class="numbers_table" onclick="display('-')">-</button></td>
        </tr>
        <tr>
            <td><button class="numbers_table" onclick="display('7')">7</button></td>
            <td><button class="numbers_table" onclick="display('8')">8</button></td>
            <td><button class="numbers_table" onclick="display('9')">9</button></td>
            <td><button class="numbers_table" onclick="display('*')">x</button></td>
        </tr>
        <tr>
            <td><button class="numbers_table" onclick="display('0')">0</button></td>
            <td><button class="numbers_table" onclick="display('.')">.</button></td>
            <td><button class="numbers_table" onclick="calculate()">=</button></td>
            <td><button class="numbers_table" onclick="display('/')">/</button></td>
        </tr>
          <tr>
            <td colspan="3"><input type="text" id="result" size="20"></td>
            <td><input type="button" value="c" class="numbers_table" onclick="clr()"></td>
        </tr>
    </table>
    <script src="mainjs.js"></script>
</body>
</html>
